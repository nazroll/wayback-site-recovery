name: Release skill package

# Releases begin as a draft release written by the maintainer.
# Publishing the draft creates the v* tag, which triggers this workflow.
# CI only tests, builds, and attaches the package; it never creates
# a release or writes release notes.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Build .skill package
        run: |
          mkdir -p stage/wayback-site-recovery/references stage/wayback-site-recovery/scripts
          cp SKILL.md README.md stage/wayback-site-recovery/
          cp references/pywaybackup-cli.md stage/wayback-site-recovery/references/
          cp scripts/coverage_report.py stage/wayback-site-recovery/scripts/
          cd stage && zip -r ../wayback-site-recovery.skill wayback-site-recovery
      - name: Attach package to the maintainer-written release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "No release found for tag $GITHUB_REF_NAME." >&2
            echo "Releases start as a draft written by the maintainer; publish the draft instead of pushing a bare tag." >&2
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" wayback-site-recovery.skill --clobber --repo "$GITHUB_REPOSITORY"
